<!DOCTYPE html>
<html>
    <head>
        <title>form Tag</title>
    </head>
    <body>
        <h1>forms in html</h1>
        <form action="">
            <input type="text" placeholder="Username"><br>
            <input type="text" placeholder="Password"><br>
            <input type="button" value="Login">
            <input type="date" min="2026-05-13" max="2026-05-31">
            <input type="email">
            <input type="number">
            <input type="button">Button</button>
            <p>SSCL</p>
            <input type="checkbox" checked>
            <p>+2</p>
            <input type="checkbox">
            <p>Gender</p>
            Male<input type="radio" name="Gender"><!--the gender value give for name attribute for both male and female-->
            Female<input type="radio" name="Gender"><br>
            <input type="file" name="" id="" accept=".pdf">
            <label for="SSCL">SSCL</label><!-- label is used for when we select the text the checkbox is enable-->
            <input type="checkbox" id="SSCL"><br><br>
            <!-- for dropdown we use <select> tag-->
                <select name="" id="">
                    <!--disable selected is used ,when the user can't choose that option-->
               <option value="" disabled selected>select your country</option>
               <option value="india">india</option>
               <option value="pakisthan">pakisthan</option>
               <option value="china">china</option>
               </select><br>
               
               <!--<textarea> tag is used give a wide area of span  LIKE when we
                 enter our address we need a large space-->

                <br><textarea name="" id="" cols="18" rows="6">panchuvartha house thekkethara ayalur</textarea>

               </form>
 </body>
</html>
